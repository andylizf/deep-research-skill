name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          for f in SKILL.md INSTALL.md README.md; do
            test -f "$f" || { echo "Missing: $f"; exit 1; }
          done
          echo "All files present"

      - name: Validate SKILL.md frontmatter
        run: |
          head -20 SKILL.md | grep -q "^name:" || { echo "Missing name in frontmatter"; exit 1; }
          head -20 SKILL.md | grep -q "^description:" || { echo "Missing description in frontmatter"; exit 1; }
          echo "Frontmatter OK"

      - name: Validate SKILL.md references web-plane
        run: |
          grep -q "web-plane" SKILL.md || { echo "SKILL.md should reference web-plane"; exit 1; }
          # Ensure no old ~/.deep-research/ paths remain
          ! grep -q "\.deep-research" SKILL.md || { echo "SKILL.md still references old ~/.deep-research/ paths"; exit 1; }
          echo "References OK"
